<!DOCTYPE html>
<html lang="en-us">
<head>
  <style>
    html, body { background: transparent !important; width: 100%; height: 100%; margin: 0; overflow: hidden; }
    #unity-container { background: transparent !important; width: 100%; height: 100%; }
    canvas { background: transparent !important; width: 100%; height: 100%; display: block; }



    
  </style>
</head>
<body>
  <div id="unity-container">
    <canvas id="unity-canvas"></canvas>
  </div>
  <div id="character-ui">
      <button class="char-btn" onclick="if(window.clickPrev) window.clickPrev(); else alert('로딩중입니다.');">◁</button>
      <button class="select-btn" onclick="if(window.clickSelect) window.clickSelect(); else alert('로딩중입니다.');">선택</button>
      <button class="char-btn" onclick="if(window.clickNext) window.clickNext(); else alert('로딩중입니다.');">▷</button>
    </div>

    <script>
      var canvas = document.querySelector("#unity-canvas");
      var config = {
        dataUrl: "Build/TalkAI_3D_Build.data.unityweb",
        frameworkUrl: "Build/TalkAI_3D_Build.framework.js.unityweb",
        codeUrl: "Build/TalkAI_3D_Build.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "TALKAI01",
        productVersion: "0.1.0",
        webglContextAttributes: { "preserveDrawingBuffer": true, "alpha": true }
      };

      // 유니티 변수 준비
      var myUnityInstance = null;

      // 🔥 함수를 가장 먼저 브라우저에 등록해버립니다 (에러 2번 원천 차단)
      window.clickPrev = function() {
        if(myUnityInstance != null) {
            // 🔥 여기를 CharacterManager 로 바꿨습니다! (오브젝트 이름과 일치)
            myUnityInstance.SendMessage('CharacterManager', 'ShowCharacter1');
        }
    };

    window.clickNext = function() {
        if(myUnityInstance != null) {
            // 🔥 여기도 CharacterManager 로 바꿨습니다!
            myUnityInstance.SendMessage('CharacterManager', 'ShowCharacter2');
        }
    };

      window.clickSelect = function() {
    // 1. 선택한 캐릭터 번호 저장
    localStorage.setItem("selectedTalkAI_Char", window.currentCharacter);
    
    // 2. 대화창(프리토킹 화면)으로 이동! (예: 'screen-main'이 대화창이라면)
    // 💡 navigate 함수가 실행되면서 알아서 캐릭터가 우측 하단으로 스르륵 날아갑니다.
    window.navigate('screen-main'); 
};

      // 유니티 로딩 시작
      var script = document.createElement("script");
      script.src = "Build/TalkAI_3D_Build.loader.js";
      script.onload = () => { 
          createUnityInstance(canvas, config).then((unityInstance) => {
              myUnityInstance = unityInstance; 
              canvas.style.background = "transparent"; 
          }); 
      };
      document.body.appendChild(script);
    </script>
</body>
</html>
