<!DOCTYPE html>
<html lang="en-us">
<head>
  <style>
    html, body { background: transparent !important; overflow: hidden; margin: 0; padding: 0; width: 100%; height: 100%; }
    #unity-container, canvas { background: transparent !important; width: 100%; height: 100%; display: block; }
  </style>
</head>
<body>
  <div id="unity-container"><canvas id="unity-canvas"></canvas></div>
  <script>
    var canvas = document.querySelector("#unity-canvas");
    var config = {
      // 👇 파일명은 대표님 세팅에 맞게 고정해두었습니다
      dataUrl: "Build/TalkAI_3D_Build.data.unityweb",
      frameworkUrl: "Build/TalkAI_3D_Build.framework.js.unityweb",
      codeUrl: "Build/TalkAI_3D_Build.wasm.unityweb",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "DefaultCompany",
      productName: "TALKAI01",
      productVersion: "0.1.0",
      // 👇 유니티가 지워버렸던 투명도 치트키를 다시 박아넣습니다
      webglContextAttributes: { "preserveDrawingBuffer": true, "alpha": true }
    };
    var script = document.createElement("script");
    script.src = "Build/TalkAI_3D_Build.loader.js";
    script.onload = () => { createUnityInstance(canvas, config); };
    document.body.appendChild(script);
  </script>
</body>
</html>
