<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <title>TalkAI 3D Avatar</title>
  <style>
    /* 방해되는 모든 여백과 배경색을 강제로 투명하게 날려버립니다 */
    html, body {
      width: 100%; height: 100%;
      margin: 0; padding: 0;
      background: transparent !important;
      overflow: hidden;
    }
    #unity-container {
      width: 100%; height: 100%;
      background: transparent !important;
    }
    canvas {
      width: 100%; height: 100%;
      display: block;
      background: transparent !important;
    }
  </style>
</head>
<body>
  <div id="unity-container">
    <canvas id="unity-canvas"></canvas>
  </div>

  <script>
    var canvas = document.querySelector("#unity-canvas");
    var buildUrl = "Build";
    
    var config = {
      dataUrl: buildUrl + "/TalkAI_3D_Build.data.unityweb",
      frameworkUrl: buildUrl + "/TalkAI_3D_Build.framework.js.unityweb",
      codeUrl: buildUrl + "/TalkAI_3D_Build.wasm.unityweb",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "DefaultCompany",
      productName: "TALKAI01",
      productVersion: "0.1.0",
      // 👇 웹페이지 투명도를 위한 최종 치트키
      webglContextAttributes: { "preserveDrawingBuffer": true, "alpha": true }
    };

    var script = document.createElement("script");
    script.src = buildUrl + "/TalkAI_3D_Build.loader.js";
    script.onload = () => {
      createUnityInstance(canvas, config).then((unityInstance) => {
        window.myUnityInstance = unityInstance; 
      }).catch((message) => {
        console.error(message);
      });
    };
    document.body.appendChild(script);
  </script>
</body>
</html>
