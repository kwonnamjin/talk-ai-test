<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | TALKAI01</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">

<style>
  /* 화면 전체와 유니티 컨테이너를 강제로 투명하게 만듭니다 */
  body, #unity-container, #unity-canvas {
    background: transparent !important;
    background-color: transparent !important;
  }
</style>
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-logo-title-footer"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">TALKAI01</div>
      </div>
    </div>
    <script>
  var canvas = document.querySelector("#unity-canvas");
  
  // 💡 모바일/PC 상관없이 무조건 꽉 차게 만들기!
  canvas.style.width = "100%";
  canvas.style.height = "100%";

  var buildUrl = "Build";
  // 👇 실제 파일 이름으로 정확하게 수정되었습니다.
  var loaderUrl = buildUrl + "/TalkAI_3D_Build.loader.js";
  
  var config = {
    dataUrl: buildUrl + "/TalkAI_3D_Build.data.unityweb",
    frameworkUrl: buildUrl + "/TalkAI_3D_Build.framework.js.unityweb",
    codeUrl: buildUrl + "/TalkAI_3D_Build.wasm.unityweb",
    streamingAssetsUrl: "StreamingAssets",
    companyName: "DefaultCompany",
    productName: "TALKAI01",
    productVersion: "0.1.0",
    // 👇 배경 투명도를 위한 최종 치트키
    webglContextAttributes: { "preserveDrawingBuffer": true, "alpha": true }
  };

  var script = document.createElement("script");
  script.src = loaderUrl;
  script.onload = () => {
    createUnityInstance(canvas, config, (progress) => {
       // 로딩바 진행 상황
    }).then((unityInstance) => {
      if (document.querySelector("#unity-loading-bar")) {
          document.querySelector("#unity-loading-bar").style.display = "none";
      }
      window.myUnityInstance = unityInstance; 
    }).catch((message) => {
      console.error(message);
    });
  };
  document.body.appendChild(script);
</script>
  </body>
</html>
